<div class="login-container d-flex justify-content-center align-items-center">
  <div class="login-card card p-4 shadow-sm">
    <div class="card-body">

      <!-- Logo e Título -->
      <div class="text-center mb-4">
        <img src="assets/logo_branco2.png" alt="Summit Tech School Logo" class="login-logo mb-2">
        <h3 class="card-title">Bem-vindo(a)</h3>
        <p class="card-subtitle text-muted">Acesse o painel de ocorrências</p>
      </div>

      <!-- Formulário -->
      <form>
        <!-- Campo de Login -->
        <div class="mb-3">
          <label for="login" class="form-label">Usuário</label>
          <input type="text" class="form-control" id="login" placeholder="Digite seu usuário">
        </div>

        <!-- Campo de Senha -->
        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
        </div>

        <!-- Botão de Entrar -->
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Entrar</button>
        </div>
      </form>

    </div>
  </div>
</div>
