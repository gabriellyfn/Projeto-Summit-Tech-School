<div class="admin-container">
  <div class="admin-card">
    <header class="admin-header">
      <h2>Painel Administrativo</h2>
      <p>Configuração de Parâmetros e Ocorrências Escolares</p>
    </header>

    <form [formGroup]="ocorrenciaForm" (ngSubmit)="onSubmit()" class="admin-form">

      <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

      <div class="form-group">
        <label for="nome">Nome da Ocorrência</label>
        <input
          id="nome"
          type="text"
          formControlName="nome"
          placeholder="Ex: Atraso Individual"
          [ngClass]="{'is-invalid': ocorrenciaForm.get('nome')?.touched && ocorrenciaForm.get('nome')?.invalid}"
        />
        <div *ngIf="ocorrenciaForm.get('nome')?.touched && ocorrenciaForm.get('nome')?.invalid" class="error-text">
          O nome é obrigatório (mínimo 3 caracteres).
        </div>
      </div>

      <div class="form-group">
        <label for="tipo">Tipo de Impacto</label>
        <select
          id="tipo"
          formControlName="tipo"
          [ngClass]="{'is-invalid': ocorrenciaForm.get('tipo')?.touched && ocorrenciaForm.get('tipo')?.invalid}"
        >
          <option value="">Selecione uma opção...</option>
          <option value="LEVE">Leve (Perda de pontos menor)</option>
          <option value="MEDIA">Média (Notificação aos responsáveis)</option>
          <option value="GRAVE">Grave (Suspensão/Punição severa)</option>
        </select>
        <div *ngIf="ocorrenciaForm.get('tipo')?.touched && ocorrenciaForm.get('tipo')?.invalid" class="error-text">
          Selecione o tipo da ocorrência.
        </div>
      </div>

      <div class="form-group">
        <label for="descricao">Regra / Descrição Detalhada</label>
        <textarea
          id="descricao"
          formControlName="descricao"
          rows="4"
          placeholder="Descreva os critérios e punições automáticas desta ocorrência..."
          [ngClass]="{'is-invalid': ocorrenciaForm.get('descricao')?.touched && ocorrenciaForm.get('descricao')?.invalid}"
        ></textarea>
        <div *ngIf="ocorrenciaForm.get('descricao')?.touched && ocorrenciaForm.get('descricao')?.invalid" class="error-text">
          A descrição do parâmetro é obrigatória.
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Salvar Configuração</span>
        <span *ngIf="loading">Processando...</span>
      </button>

    </form>
  </div>
</div>
